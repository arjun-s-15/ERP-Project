<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, serif;
            background: #f4f4f8;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 48px 16px;
            color: #1a1a2e;
        }
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 820px;
            padding: 40px 48px;
            border-top: 5px solid #c0392b;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
        }
        .card-header { margin-bottom: 32px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .card-header h2 { font-size: 22px; letter-spacing: 3px; text-transform: uppercase; color: #1a1a2e; }
        .card-header p { font-size: 11px; color: #aaa; letter-spacing: 1px; margin-top: 4px; }
        .field-group { margin-bottom: 20px; }
        .field-group label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 6px; }
        .field-group input {
            width: 100%; padding: 10px 14px; font-size: 13px;
            font-family: Georgia, serif; border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafafa; color: #1a1a2e; outline: none; transition: border-color 0.2s;
        }
        .field-group input:focus { border-color: #c0392b; background: #fff; }
        .two-col { display: flex; gap: 16px; }
        .two-col .field-group { flex: 1; }
        .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
        .auto-badge {
            font-size: 10px; color: #c0392b; letter-spacing: 1px;
            text-transform: uppercase; margin-bottom: 20px; padding: 8px 12px;
            border: 1px dashed #c0392b; display: inline-block; border-radius: 4px;
        }

        /* ── LINE ITEMS ── */
        .section-label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
            color: #888; margin-bottom: 10px; margin-top: 28px; font-weight: normal;
        }
        .col-headers {
            display: grid;
            grid-template-columns: 2fr 2fr 70px 120px 100px 36px;
            gap: 8px;
            margin-bottom: 6px;
            padding: 0 2px;
        }
        .col-header {
            font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
            color: #888; font-weight: normal;
        }
        .item-row {
            display: grid;
            grid-template-columns: 2fr 2fr 70px 120px 100px 36px;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        .item-row input {
            width: 100%; padding: 9px 12px; font-size: 13px;
            font-family: Georgia, serif; border: 1px solid #ddd;
            border-radius: 6px; background: #fafafa;
            color: #1a1a2e; outline: none; transition: border-color 0.2s;
        }
        .item-row input:focus { border-color: #c0392b; background: #fff; }
        .btn-remove {
            width: 34px; height: 34px;
            background: none; border: 1px solid #ddd;
            border-radius: 6px; color: #aaa;
            cursor: pointer; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-remove:hover { border-color: #c0392b; color: #c0392b; }
        .btn-add {
            background: none; border: 1px dashed #c0392b; color: #c0392b;
            padding: 9px 20px; font-size: 12px; font-family: Georgia, serif;
            letter-spacing: 1px; cursor: pointer; margin-top: 4px;
            margin-bottom: 28px; border-radius: 6px;
            transition: background 0.2s, color 0.2s; display: inline-block;
        }
        .btn-add:hover { background: #c0392b; color: #fff; }

        /* ── TOTALS ── */
        .totals-box {
            width: 280px; margin-left: auto; margin-top: 8px;
        }
        .totals-row {
            display: flex; justify-content: space-between;
            font-size: 13px; padding: 7px 0;
            border-bottom: 1px solid #eee; color: #555;
        }
        .totals-row.grand {
            background: #1a1a2e; color: #fff;
            padding: 10px 14px; border-radius: 6px;
            margin-top: 4px; border: none; font-size: 14px;
        }

        /* ── SUBMIT ── */
        .btn-submit {
            width: 100%; padding: 14px; background: #1a1a2e; color: #ffffff;
            border: none; font-size: 13px; font-family: Georgia, serif;
            letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
            margin-top: 24px; border-radius: 6px; transition: background 0.2s;
        }
        .btn-submit:hover { background: #c0392b; }
    </style>

    <script>
        let rowCount = 0;

        function addRow() {
            const container = document.getElementById('rows');
            const div = document.createElement('div');
            div.className = 'item-row';
            div.dataset.index = rowCount;
            div.innerHTML = `
                <input type="text"   name="items[${rowCount}].itemName"    placeholder="e.g. Web design" oninput="recalc()"/>
                <input type="text"   name="items[${rowCount}].description" placeholder="Optional"/>
                <input type="number" name="items[${rowCount}].quantity"    placeholder="1" min="1" value="1" oninput="recalc()"/>
                <input type="number" name="items[${rowCount}].unitPrice"   placeholder="0.00" step="0.01" min="0" oninput="recalc()"/>
                <input type="number" name="items[${rowCount}].taxRate"     placeholder="18" step="0.01" min="0" max="100" value="18" oninput="recalc()"/>
                <button type="button" class="btn-remove" onclick="removeRow(this)">✕</button>
            `;
            container.appendChild(div);
            rowCount++;
            recalc();
        }

        function removeRow(btn) {
            btn.closest('.item-row').remove();
            recalc();
        }

        function recalc() {
            const rows = document.querySelectorAll('.item-row[data-index]');
            let subtotal = 0, taxTotal = 0;
            rows.forEach(row => {
                const qty   = parseFloat(row.querySelector('[name$=".quantity"]')?.value)  || 0;
                const price = parseFloat(row.querySelector('[name$=".unitPrice"]')?.value) || 0;
                const tax   = parseFloat(row.querySelector('[name$=".taxRate"]')?.value)   || 0;
                const itemTotal = qty * price;
                subtotal += itemTotal;
                taxTotal += itemTotal * tax / 100;
            });
            const discountInput = parseFloat(document.getElementById('discountInput')?.value) || 0;
            const total = subtotal + taxTotal - discountInput;
            document.getElementById('t-subtotal').textContent = 'Rs. ' + subtotal.toFixed(2);
            document.getElementById('t-tax').textContent      = 'Rs. ' + taxTotal.toFixed(2);
            document.getElementById('t-discount').textContent = 'Rs. ' + discountInput.toFixed(2);
            document.getElementById('t-total').textContent    = 'Rs. ' + total.toFixed(2);
        }

        window.onload = () => addRow();
    </script>
</head>
<body>
<div class="card">

    <div class="card-header">
        <h2>New Invoice</h2>
        <p>ABC Fintech Pvt Ltd &#160;|&#160; GST Tax Invoice</p>
    </div>

<!--    <div class="auto-badge">⚡ Invoice number is auto-generated</div>-->

    <form th:action="@{/invoice/generate}" method="post">

        <!-- Customer details -->
        <div class="two-col">
            <div class="field-group">
                <label>Customer Name</label>
                <input type="text" name="customer.name" placeholder="Acme Corp"/>
            </div>
            <div class="field-group">
                <label>Customer Email</label>
                <input type="email" name="customer.email" placeholder="billing@acme.com"/>
            </div>
        </div>

        <div class="two-col">
            <div class="field-group">
                <label>Customer Phone</label>
                <input type="text" name="customer.phone" placeholder="+91 98765 43210"/>
            </div>
            <div class="field-group">
                <label>GSTIN</label>
                <input type="text" name="customer.gstin" placeholder="07ABCDE1234F1Z5"/>
            </div>
        </div>

        <div class="field-group">
            <label>Customer Address</label>
            <input type="text" name="customer.address" placeholder="123, MG Road, New Delhi"/>
        </div>

        <hr class="divider"/>

        <div class="two-col">
            <div class="field-group">
                <label>Issue Date</label>
                <input type="date" name="issueDate"/>
            </div>
            <div class="field-group">
                <label>Due Date</label>
                <input type="date" name="dueDate"/>
            </div>
        </div>

        <div class="two-col">
            <div class="field-group">
                <label>Discount (Rs.)</label>
                <input type="number" id="discountInput" name="discount" placeholder="0.00" step="0.01" min="0" oninput="recalc()"/>
            </div>
            <div class="field-group">
                <label>Notes</label>
                <input type="text" name="notes" placeholder="Payment due within 30 days"/>
            </div>
        </div>

        <hr class="divider"/>

        <!-- Line Items -->
        <div class="section-label">Line Items</div>

        <div class="col-headers">
            <div class="col-header">Item name</div>
            <div class="col-header">Description</div>
            <div class="col-header">Qty</div>
            <div class="col-header">Unit price</div>
            <div class="col-header">Tax rate %</div>
            <div></div>
        </div>

        <div id="rows"></div>

        <button type="button" class="btn-add" onclick="addRow()">+ Add item</button>

        <!-- Live totals -->
        <div class="totals-box">
            <div class="totals-row"><span>Subtotal</span><span id="t-subtotal">Rs. 0.00</span></div>
            <div class="totals-row"><span>Tax</span><span id="t-tax">Rs. 0.00</span></div>
            <div class="totals-row"><span>Discount</span><span id="t-discount">Rs. 0.00</span></div>
            <div class="totals-row grand"><span>Total</span><span id="t-total">Rs. 0.00</span></div>
        </div>

        <button type="submit" class="btn-submit">Generate Invoice PDF</button>

    </form>
</div>
</body>
</html>
