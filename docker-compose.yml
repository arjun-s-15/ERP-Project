services:

  # ─────────────────────────────────────────────
  # Spring Boot App (Invoice Service)
  # ─────────────────────────────────────────────
  app:
    build:
      context: ./Backend/Invoice-MS
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: invoice-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/invoice_ms
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Python AI service base URL (for RestTemplate / WebClient calls)
      AI_SERVICE_URL: http://ai-service:8000
    networks:
      - app-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Python / FastAPI AI Service
  # ─────────────────────────────────────────────
  ai-service:
    build:
      context: ./AI-service
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - app-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # MySQL 8 – Shared Database
  # ─────────────────────────────────────────────
  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: invoice_ms
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge